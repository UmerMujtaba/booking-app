kind = "mobile"
previewPath = "/"
title = "Local Business Booking"
version = "1.0.0"
id = "artifacts/booking-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24512

[services.development]
run = "pnpm --filter @workspace/booking-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/booking-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/booking-app", "run", "serve" ]

[services.env]
PORT = "24512"
BASE_PATH = "/"
